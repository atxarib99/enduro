openapi: "3.0.0"
info:
  title: "enduro api"
  description: "REST API for interfacing enduro api and engine"
  version: "1.0.0"
  contact:
    name: "Arib Dhuka"
    email: "atxarib99@gmail.com"

servers:
  - url: "http://localhost:3001/enduro/v1"

components:
  schemas:

    Strategy:
      type: object
      properties:
        strats:
          type: array
          items:
            type: object
            properties:
              fuel:
                type: array
                items:
                  type: array
                  items:
                    type: string
      example: |
        [
          {
            "3.46-3.54": [
              [
                "2025-05-24T00:47:00+00:00",
                "2025-05-24T01:39:02.500000+00:00"
              ],
              [
                "2025-05-24T01:39:02.500000+00:00",
                "2025-05-24T02:31:05+00:00"
              ]
            ]
          },
          {
            "3.55-3.64": [
              [
                "2025-05-24T00:47:00+00:00",
                "2025-05-24T01:39:02.500000+00:00"
              ],
              [
                "2025-05-24T01:39:02.500000+00:00",
                "2025-05-24T02:31:05+00:00"
              ]
            ]
          }
        ]





    StrategyRequest:
      type: object
      properties:
        fuel_remaining:
          type: number
        fuel_usage:
          type: number
        max_fuel:
          type: number
        remaining_time:
          type: number
        lap_time:
          type: number
        start_time:
          type: string


  requestBodies:
    StrategyRequest:
      description: 'Strategy Parameters'
      required: true
      x-body-name: 'strategyRequest'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StrategyRequest'


paths:
  /generate-strats:
    post:
      operationId: app.generate
      description: "generates optimal strategies based on inputs"
      tags:
        - strategy
      requestBody:
        $ref: '#/components/requestBodies/StrategyRequest'
      responses:
        "200":
          description: "Successfully generated strategy"
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/Strategy'

tags:
  - name: strategy
    description: "Strategy calls"

  
